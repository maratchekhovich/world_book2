{% extends "base_generic.html" %}

{% block content %}
  <h1>Все книги</h1>

  <ul>
    {% for book in object_list %}
      <li>
        <a href="{{ book.get_absolute_url }}">
          {{ book.title }} </a>
        ( {{book.genre}} )
        <a href="/book/update/{{book.id}} "> Изменить</a>
        <a href="/book/delete/{{book.id}} ">Удалить</a>
      </li>
    {% endfor %}
  </ul>

{% endblock %}
