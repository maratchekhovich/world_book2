{% extends "base_generic.html" %}

{% block content %}
<h2>Регистрация</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Зарегистрироваться</button>
</form>
<p>После регистрации вам придёт письмо для установки пароля.</p>
<p>Уже есть аккаунт? <a href="{% url 'login' %}">Войти</a></p>
{% endblock %}
